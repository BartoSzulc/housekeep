services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - storage:/app/storage
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - housekeep

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: housekeep
      MYSQL_USER: housekeep
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      TZ: Europe/Warsaw
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - housekeep

volumes:
  mysql_data:
  storage:

networks:
  housekeep:
    driver: bridge
